global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
  - job_name: novabank
    static_configs:
      - targets: ['novabank:4000']
    metrics_path: /api/metrics
  - job_name: node_exporter
    static_configs:
      - targets: ['node_exporter:9100']